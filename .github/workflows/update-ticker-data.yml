name: Update ticker data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh data
        env:
          SIMMER_API_KEY: ${{ secrets.SIMMER_API_KEY }}
          SIMMER_API_BASE: https://api.simmer.markets
        run: node update_data.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git add docs/data.json docs/data.js docs/index.html
          git commit -m "chore: refresh ticker data"
          git push
